<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialed Color Memory.embed</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        :root {
            --bg-color: #ffffff; 
            --card-bg: #000000; 
            --text-main: #ffffff;
            --text-muted: #808080;
            --prep-color-start: #ff7e5f; 
            --prep-color-end: #feb47b; 
            --run-color: #ffffff;
            --success-color: #22c55e;
            --fail-color: #ef4444;
            --ok-color: #eab308;
            --card-bg-hard: #0f0208;
            --prep-hard-start: #580242;
            --prep-hard-end: #9d174d;
            --run-hard-color: #fbcfe8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.mode-hard {
            background-color: #000000;
        }

        body.mode-color {
            background-color: #1a1a24;
        }

        .game-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 680px;
            height: 620px;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2.5rem 3rem;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.5s ease, background-color 0.4s ease, border-color 0.4s ease;
            animation: cardFloat 4s ease-in-out infinite alternate;
        }

        body.mode-hard .game-card {
            background-color: var(--card-bg-hard);
            border-color: rgba(219, 39, 119, 0.6);
            box-shadow: 0 30px 80px -12px rgba(219, 39, 119, 0.3);
        }

        body.mode-color .game-card {
            background-color: #0f0f13;
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 30px 80px -12px rgba(79, 70, 229, 0.2);
        }

        @keyframes cardFloat {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-8px); }
        }

        body.mode-hard .game-card {
            animation: cardFloat 4s ease-in-out infinite alternate, glitchCardCenter 2.2s infinite ease-in-out;
        }

        @keyframes glitchCardCenter {
            0%, 35%, 39%, 100% { transform: translateY(-8px) skew(0deg); border-color: rgba(219, 39, 119, 0.6); box-shadow: 0 30px 80px -12px rgba(219, 39, 119, 0.3); }
            36% { transform: translateY(-13px) skew(6deg) scale(0.99); border-color: #ff0055; box-shadow: 0 0 50px rgba(255,0,85,0.5); }
            37% { transform: translateY(-5px) skew(-6deg) scale(1.01); border-color: #00ffff; box-shadow: 0 0 50px rgba(0,255,255,0.5); }
            38% { transform: translateY(-10px) skew(2deg); border-color: #9d174d; }
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .round-display {
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        body.mode-hard .round-display { color: #fbcfe8; }
        body.mode-color .round-display { color: #a5b4fc; }

        .top-toggles {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            height: 30px;
        }

        .hard-mode-toggle, .color-mode-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .hard-mode-toggle:hover { color: #f472b6; }
        .color-mode-toggle:hover { color: #818cf8; }

        .toggle-switch {
            width: 38px;
            height: 20px;
            background: #333;
            border-radius: 20px;
            position: relative;
            transition: background 0.3s;
        }

        .toggle-switch::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: #808080;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s, background 0.3s;
        }

        body.mode-hard .toggle-switch { background: #be185d; }
        body.mode-hard .toggle-switch::before { transform: translateX(18px); background: #fbcfe8; }

        body.mode-color .toggle-switch { background: #4f46e5; }
        body.mode-color .toggle-switch::before { transform: translateX(18px); background: #c7d2fe; }

        body.mode-hard .hard-mode-toggle { color: #fbcfe8; }
        body.mode-color .color-mode-toggle { color: #c7d2fe; }

        .target-display {
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--text-main);
            transition: color 0.3s ease;
        }

        body.mode-hard .target-display { color: #fbcfe8; }
        body.mode-color .target-display { color: #c7d2fe; }

        .main-display {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            gap: 0.5rem;
            position: relative;
        }

        .timer-val {
            font-size: 10rem;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            letter-spacing: -4px;
            color: var(--text-main);
            transition: all 0.3s ease;
            line-height: 0.9;
        }

        body.mode-hard .timer-val { animation: glitchNumberSoft 2s infinite; }

        @keyframes glitchNumberSoft {
            0%, 85%, 100% { transform: translate(0, 0); opacity: 1; text-shadow: none; }
            86% { transform: translate(-4px, 2px); color: #ff0055; opacity: 0.9; text-shadow: 2px 0 cyan; }
            87% { transform: translate(4px, -2px); color: #00ffff; opacity: 0.9; text-shadow: -2px 0 #ff0055; }
            88% { transform: translate(-2px, 1px); color: #ffffff; opacity: 1; }
        }

        body:not(.mode-hard).state-preparing .timer-val {
            background: linear-gradient(45deg, var(--prep-color-start), var(--prep-color-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulseDegradado 1.5s ease-in-out infinite alternate, shakePrep 0.3s ease-in-out infinite alternate;
        }

        body.mode-hard.state-preparing .timer-val {
            background: linear-gradient(45deg, var(--prep-hard-start), var(--prep-hard-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulseDegradado 1.5s ease-in-out infinite alternate, shakePrep 0.3s ease-in-out infinite alternate, glitchText 0.12s infinite;
        }

        @keyframes glitchText {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(3px, -1px); }
            60% { transform: translate(-1px, 3px); }
            80% { transform: translate(2px, -3px); }
            100% { transform: translate(0, 0); }
        }

        @keyframes pulseDegradado {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        body.state-running .timer-val { color: var(--run-color); }
        body.mode-hard.state-running .timer-val { color: var(--run-hard-color); }
        body.mode-hard.state-running .timer-val { font-size: 3rem; color: transparent; }

        .score-label {
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--text-muted);
            text-align: center;
            min-height: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-val {
            font-size: 4.5rem;
            font-weight: 900;
            text-align: center;
            min-height: 85px;
            color: var(--text-main);
            transition: color 0.3s ease;
            line-height: 1;
            letter-spacing: -2px;
        }

        .summary-title {
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            color: var(--text-main);
            animation: countUpIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .summary-subtitle {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-top: 1rem;
            margin-bottom: 2rem;
            max-width: 400px;
            text-align: center;
            animation: fadeInMsg 0.6s ease-in;
        }

        .summary-box {
            background: #1a1a1a;
            border: 2px solid #333333;
            border-radius: 24px;
            padding: 1.5rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body.mode-hard .summary-box { background: #20020d; border-color: #9d174d; }
        body.mode-color .summary-box { background: #13131a; border-color: #6366f1; }

        .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--text-main);
        }

        .rounds-grid {
            display: flex;
            gap: 4px;
            width: 100%;
            height: 75px;
            border-radius: 12px;
            overflow: hidden;
        }

        .round-box {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            padding: 8px;
            font-size: 1.25rem;
            font-weight: 900;
            position: relative;
            color: #fff;
            transform-origin: bottom;
            animation: fillGridChain 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }

        .round-box:nth-child(1) { animation-delay: 0.1s; }
        .round-box:nth-child(2) { animation-delay: 0.2s; }
        .round-box:nth-child(3) { animation-delay: 0.3s; }
        .round-box:nth-child(4) { animation-delay: 0.4s; }
        .round-box:nth-child(5) { animation-delay: 0.5s; }

        @keyframes fillGridChain {
            0% { transform: scaleY(0) scaleX(0.8) skew(10deg); opacity: 0; filter: blur(4px); }
            40% { transform: scaleY(1.15) scaleX(1) skew(-4deg); opacity: 1; filter: blur(0px); }
            70% { transform: scaleY(0.95) scaleX(1) skew(2deg); }
            100% { transform: scaleY(1) scaleX(1) skew(0deg); opacity: 1; }
        }

        .round-box::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.4) 100%);
            z-index: 1;
        }

        .round-box span { z-index: 2; }

        .round-box.grade-poor { background-color: #591919; } 
        .round-box.grade-ok { background-color: #854d0e; } 
        .round-box.grade-good { background-color: #401959; } 
        .round-box.grade-great { background-color: #2b5919; } 
        .round-box.grade-perfect { background-color: #193659; } 

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            position: relative;
        }

        .instructions {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-muted);
            max-width: 450px;
            line-height: 1.4;
            transition: color 0.3s ease;
        }

        body.mode-hard .instructions { color: #fbcfe8; }
        body.mode-color .instructions { color: #a5b4fc; }

        .btn-reset {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
            border: none;
            outline: none;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        body.mode-hard .btn-reset {
            background: #fbcfe8;
            box-shadow: 0 0 20px rgba(219, 39, 119, 0.4);
            animation: pulseBorder 1.5s infinite alternate;
        }

        body.mode-color .btn-reset {
            background: #c7d2fe;
            box-shadow: 0 0 20px rgba(79, 70, 229, 0.4);
            animation: pulseBorderColor 1.5s infinite alternate;
        }

        @keyframes pulseBorder {
            0% { box-shadow: 0 0 15px rgba(219, 39, 119, 0.4); }
            100% { box-shadow: 0 0 30px rgba(219, 39, 119, 0.8); }
        }

        @keyframes pulseBorderColor {
            0% { box-shadow: 0 0 15px rgba(79, 70, 229, 0.4); }
            100% { box-shadow: 0 0 30px rgba(79, 70, 229, 0.8); }
        }

        body.mode-hard .btn-reset:hover { background: #fbcfe8; box-shadow: 0 0 35px rgba(219, 39, 119, 1); }
        body.mode-color .btn-reset:hover { background: #c7d2fe; box-shadow: 0 0 35px rgba(79, 70, 229, 1); }

        .btn-reset:hover {
            transform: scale(1.15) rotate(180deg);
            background: #e0e0e0;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
        }

        .btn-reset svg {
            fill: #000000;
            width: 24px;
            height: 24px;
            transition: transform 0.3s ease;
        }

        .btn-reset:hover svg { transform: scale(1.1); }

        .restart-nav-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        
        .restart-nav-container span {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .restart-nav-container:hover span { color: #ffffff; }
        body.mode-hard .restart-nav-container:hover span { color: #fbcfe8; }
        body.mode-color .restart-nav-container:hover span { color: #a5b4fc; }

        .btn-restart-nav {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #222222;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        body.mode-hard .btn-restart-nav {
            background: #3a0319;
            border-color: rgba(219, 39, 119, 0.4);
        }

        body.mode-color .btn-restart-nav {
            background: #1e1b4b;
            border-color: #6366f1;
        }

        .btn-restart-nav:hover {
            transform: scale(1.1) rotate(-45deg);
            background: #444444;
            border-color: rgba(255, 255, 255, 0.4);
        }

        body.mode-hard .btn-restart-nav:hover { background: #831843; border-color: #fbcfe8; }
        body.mode-color .btn-restart-nav:hover { background: #312e81; border-color: #a5b4fc; }

        .btn-restart-nav svg {
            fill: var(--text-main);
            width: 18px;
            height: 18px;
        }

        .restart-summary-container {
            position: absolute;
            bottom: 38px;
            right: 48px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
            animation: fadeInMsg 0.4s ease-in;
        }

        .restart-summary-label {
            font-size: 0.95rem;
            font-weight: 900;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        
        body.mode-hard .restart-summary-label {
            color: #fbcfe8;
            border-color: #9d174d;
            background: rgba(32, 2, 13, 0.6);
        }

        body.mode-color .restart-summary-label {
            color: #c7d2fe;
            border-color: #4f46e5;
            background: rgba(15, 23, 42, 0.8);
        }

        .btn-restart-summary {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            outline: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        body.mode-hard .btn-restart-summary {
            background: #fbcfe8;
            box-shadow: 0 0 10px rgba(219, 39, 119, 0.3);
        }

        body.mode-color .btn-restart-summary {
            background: #c7d2fe;
            box-shadow: 0 0 10px rgba(79, 70, 229, 0.3);
        }

        .btn-restart-summary:hover {
            transform: scale(1.12) translateX(-3px);
            background: #e0e0e0;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        body.mode-hard .btn-restart-summary:hover { background: #ffffff; box-shadow: 0 0 20px rgba(219, 39, 119, 0.8); }
        body.mode-color .btn-restart-summary:hover { background: #ffffff; box-shadow: 0 0 20px rgba(79, 70, 229, 0.8); }

        .btn-restart-summary svg {
            fill: #000000;
            width: 20px;
            height: 20px;
        }

        .animate-pop { animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes shakePrep {
            0% { transform: translateY(0); }
            100% { transform: translateY(-3px); }
        }

        .animate-shake { animation: shakeTotal 0.5s ease-in-out; }

        @keyframes shakeTotal {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            85% { transform: translateX(4px); }
        }

        .fade-in { animation: fadeInMsg 0.5s ease-in; }

        @keyframes fadeInMsg {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes countUpIn {
            0% { opacity: 0; transform: translateY(35px) scale(0.85); }
            60% { transform: translateY(-8px) scale(1.03); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        body.mode-hard .summary-title { text-shadow: 0 0 15px #ff0055; }

        /* Estilos pantalla de color optimizados */
        .color-game-area {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 15px;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .memory-fullscreen-box {
            width: 100%;
            height: 320px;
            border-radius: 24px;
            border: 4px solid #ffffff;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .memory-fullscreen-title {
            font-size: 1.5rem;
            font-weight: 900;
            background: rgba(0, 0, 0, 0.6);
            color: #ffffff;
            padding: 8px 20px;
            border-radius: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.2);
            animation: pulseText 2s infinite alternate;
        }

        @keyframes pulseText {
            0% { transform: scale(0.98); }
            100% { transform: scale(1.02); }
        }

        .memory-timer {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.1rem;
            font-weight: 900;
            background: rgba(0,0,0,0.7);
            color: #ef4444;
            padding: 6px 16px;
            border-radius: 12px;
            border: 1px solid #ef4444;
        }

        .color-adjust-row {
            display: flex;
            gap: 24px;
            width: 100%;
            align-items: center;
            justify-content: center;
            height: 140px;
        }

        /* Misma proporción y tamaño de la caja de memoria inicial */
        .color-preview-box {
            width: 100%;
            max-width: 320px;
            height: 130px;
            border-radius: 20px;
            border: 3px solid #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 8px;
            transition: opacity 0.4s ease;
            animation: popIn 0.4s ease-out;
            position: relative;
        }
        
        .color-box-label {
            font-size: 0.75rem;
            font-weight: 900;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 3px 10px;
            border-radius: 6px;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .sliders-col {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 380px;
            animation: fadeInMsg 0.5s ease-in;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .slider-label {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
        }

        body.mode-color .slider-label { color: #cbd5e1; }

        .color-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 12px;
            border-radius: 6px;
            outline: none;
            background: #333;
        }

        .color-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }
        
        .color-slider::-webkit-slider-thumb:hover { transform: scale(1.15); }

        #hueSlider { background: linear-gradient(to right, red, yellow, green, cyan, blue, magenta, red); }
        #satSlider { background: linear-gradient(to right, #808080, #ff0000); }
        #lightSlider { background: linear-gradient(to right, #000000, #808080, #ffffff); }

        .results-compare-box {
            display: flex;
            gap: 24px;
            margin: 10px 0 0 0;
            animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            align-items: center;
        }

        .results-preview-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .results-preview-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #ffffff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="game-card" id="gameCard">
        <div class="restart-summary-container" id="restartSummaryContainer" style="display: none;">
            <div class="restart-summary-label" id="restartSummaryLabel">Volver</div>
            <button class="btn-restart-summary" id="restartSummaryBtn" aria-label="Atrás/Reiniciar">
                <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
        </div>

        <div class="card-top" id="cardTopBarContainer">
            <div class="top-toggles" id="topTogglesArea">
                <div class="hard-mode-toggle" id="hardModeToggle">
                    <span>Modo Difícil</span>
                    <div class="toggle-switch" id="toggleSwitch"></div>
                </div>
                <div class="color-mode-toggle" id="colorModeToggle">
                    <span>Modo Color</span>
                    <div class="toggle-switch" id="colorToggleSwitch"></div>
                </div>
            </div>
            <div class="round-display">Ronda: <span id="roundVal">1</span>/5</div>
            <div class="target-display">Objetivo: <span id="targetVal">0.00</span>s</div>
        </div>

        <div class="main-display" id="mainDisplayArea">
            <div class="timer-val" id="timerVal">0.00</div>
            <div class="score-label" id="scoreLabel"></div>
            <div class="score-val" id="scoreVal"></div>
        </div>

        <div class="card-bottom" id="cardBottomNav">
            <div class="restart-nav-container" id="restartNavBtn" title="Reiniciar Partida">
                <button class="btn-restart-nav" aria-label="Reiniciar Ronda">
                    <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7a6 6 0 1 1-6 6H1a8 8 0 1 0 11-8z"/></svg>
                </button>
                <span>Reiniciar</span>
            </div>
            
            <div class="instructions" id="instructions">
                Mantén espacio para cargar. Suelta para iniciar el conteo, pulsa otra vez para parar.
            </div>
            <button class="btn-reset" id="nextBtn" aria-label="Siguiente">
                <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(freq, duration, type = 'sine', ramp = true) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.value = freq;
            
            gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
            if(ramp) {
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            } else {
                gain.gain.setValueAtTime(0.18, audioCtx.currentTime + duration - 0.05);
                gain.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            }

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playSuccessSparkle() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            
            const freqs = [523.25, 659.25, 783.99, 1046.5];
            freqs.forEach((f, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.value = f;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0, now + i * 0.08);
                gain.gain.linearRampToValueAtTime(0.12, now + i * 0.08 + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.08 + 0.3);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + i * 0.08);
                osc.stop(now + i * 0.08 + 0.3);
            });
        }

        const GAME_STATES = {
            IDLE: 0,
            PREPARING: 1,
            RUNNING: 2,
            STOPPED: 3,
            SUMMARY: 4,
            MEMORIZING: 5
        };

        let currentState = GAME_STATES.IDLE;
        let targetTime = 0.00;
        let timerStart = 0;
        let timerInterval = null;
        let elapsedTime = 0;
        let round = 1;
        let totalScore = 0;
        let chargeInterval = null;
        let chargePitch = 150;
        let roundScores = [];
        let isHardMode = false;
        let isColorMode = false;
        let runningToneOsc = null;
        let runningToneGain = null;

        let targetH = 0, targetS = 0, targetL = 0;
        let memoryTimerCount = 5;
        let memoryTimerInterval = null;

        const body = document.body;
        const gameCard = document.getElementById('gameCard');
        const targetVal = document.getElementById('targetVal');
        const roundVal = document.getElementById('roundVal');
        const timerVal = document.getElementById('timerVal');
        const scoreLabel = document.getElementById('scoreLabel');
        const scoreVal = document.getElementById('scoreVal');
        const instructions = document.getElementById('instructions');
        const nextBtn = document.getElementById('nextBtn');
        const restartNavBtn = document.getElementById('restartNavBtn');
        const restartSummaryContainer = document.getElementById('restartSummaryContainer');
        const restartSummaryBtn = document.getElementById('restartSummaryBtn');
        const mainDisplayArea = document.getElementById('mainDisplayArea');
        const cardBottomNav = document.getElementById('cardBottomNav');
        const hardModeToggle = document.getElementById('hardModeToggle');
        const colorModeToggle = document.getElementById('colorModeToggle');

        hardToggle.addEventListener('click', () => {
            if (isColorMode) return;
            if (currentState === GAME_STATES.IDLE || currentState === GAME_STATES.SUMMARY) {
                isHardMode = !isHardMode;
                updateModesClasses();
                nextRound();
            }
        });

        // Al pulsar el botón de modo color se alterna el modo de juego
        colorModeToggle.addEventListener('click', () => {
            if (currentState !== GAME_STATES.SUMMARY && currentState !== GAME_STATES.IDLE && currentState !== GAME_STATES.STOPPED) {
                return; // En mitad de la ronda si está corriendo, no se permite volver atrás de repente
            }
            isColorMode = !isColorMode;
            if (isColorMode) {
                isHardMode = false;
            }
            updateModesClasses();
            nextRound();
        });

        function updateModesClasses() {
            body.className = '';
            if (isHardMode) body.classList.add('mode-hard');
            if (isColorMode) body.classList.add('mode-color');
            
            const colorSw = document.getElementById('colorToggleSwitch');
            const hardSw = document.getElementById('toggleSwitch');
            const topTogglesArea = document.getElementById('topTogglesArea');
            const topNav = document.getElementById('TopBarContainer');
            
            if(isColorMode) {
                // Cuando el modo color está activo, se reemplaza/desaparece la zona de "difícil y color" y se pone "TIME" para volver
                topTogglesArea.innerHTML = `
                    <div class="color-mode-toggle" id="backToTimeModeBtn" style="color: #cbd5e1; font-weight:900; cursor:pointer;">
                        <span>← TIME</span>
                    </div>
                `;
                // Añadir evento al botón recién creado
                document.getElementById('backToTimeModeBtn').addEventListener('click', () => {
                    isColorMode = false;
                    updateModesClasses();
                    triggerRestart();
                });
            } else {
                topTogglesArea.innerHTML = `
                    <div class="hard-mode-toggle" id="hardModeToggle">
                        <span>Modo Difícil</span>
                        <div class="toggle-switch" id="toggleSwitch"></div>
                    </div>
                    <div class="color-mode-toggle" id="colorModeToggle">
                        <span>Modo Color</span>
                        <div class="toggle-switch" id="colorToggleSwitch"></div>
                    </div>
                `;
                // Re-bindear eventos de los toggles restaurados
                document.getElementById('hardModeToggle').addEventListener('click', () => {
                    if (isColorMode) return;
                    isHardMode = !isHardMode;
                    updateModesClasses();
                    nextRound();
                });
                document.getElementById('colorToggleSwitch').closest('.color-mode-toggle').addEventListener('click', () => {
                    isColorMode = !isColorMode;
                    updateModesClasses();
                    nextRound();
                });
            }
        }

        function generateTarget() {
            targetTime = Math.floor(Math.random() * 901 + 100) / 100;
            targetVal.textContent = targetTime.toFixed(2);
        }

        function getCalculatedScore(elapsed, target) {
            let diff = Math.abs(elapsed - target);
            let rawScore = 10 - (diff * 2.5);
            return Math.max(0, rawScore);
        }

        function getGradeClass(score) {
            if (score < 5) return 'grade-poor';
            if (score < 7) return 'grade-ok';
            if (score < 8.5) return 'grade-good';
            if (score < 9.5) return 'grade-great';
            return 'grade-perfect';
        }

        function getSummaryFlavorText(score) {
            if (score >= 45) return "¡Impecable! Tienes una memoria y precisión asombrosas.";
            if (score >= 35) return "Excelente nivel. Tienes un gran control visual.";
            if (score >= 25) return "Buen resultado, pero aún puedes afinar más tu memoria de color.";
            return "Sigue practicando, no es tan fácil clocar los tonos de memoria.";
        }

        function resetGameDisplay() {
            timerVal.textContent = "0.00";
            scoreLabel.textContent = "";
            scoreVal.textContent = "";
            scoreVal.className = 'score-val';
            instructions.className = 'instructions';
            gameCard.className = 'game-card';
            
            updateModesClasses();
            
            document.getElementById('TopBarContainer').style.display = "flex";
            mainDisplayArea.innerHTML = `
                <div class="timer-val" id="timerVal">0.00</div>
                <div class="score-label" id="scoreLabel"></div>
                <div class="score-val" id="scoreVal"></div>
            `;
            
            cardBottomNav.style.display = "flex";
            restartNavBtn.style.display = "flex";
            restartSummaryContainer.style.display = "none";
            
            nextBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>';

            const recreatedTimerVal = document.getElementById('timerVal');
            const recreatedScoreLabel = document.getElementById('scoreLabel');
            const recreatedScoreVal = document.getElementById('scoreVal');
            return { recreatedTimerVal, recreatedScoreLabel, recreatedScoreVal };
        }

        function startColorMemorize() {
            currentState = GAME_STATES.MEMORIZING;
            
            targetH = Math.floor(Math.random() * 360);
            targetS = Math.floor(Math.random() * 60) + 20;
            targetL = Math.floor(Math.random() * 60) + 20;
            
            document.getElementById('TopBarContainer').style.display = "flex";
            
            // Pantalla completa para memorizar el color
            mainDisplayArea.innerHTML = `
                <div class="color-game-area">
                    <div class="memory-fullscreen-box" style="background-color: hsl(${targetH}, ${targetS}%, ${targetL}%);" id="fullMemBox">
                        <div class="memory-timer" id="memoryTimerDisplay">5s</div>
                        <div class="memory-fullscreen-title">Memoriza el color</div>
                    </div>
                </div>
            `;
            
            instructions.textContent = "Memoriza el color que ocupa toda la pantalla. Desaparecerá en 5 segundos.";
            
            memoryTimerCount = 5;
            const memDisplay = document.getElementById('memoryTimerDisplay');

            memoryTimerInterval = setInterval(() => {
                memoryTimerCount--;
                memDisplay.textContent = `${memoryTimerCount}s`;

                if (memoryTimerCount <= 0) {
                    clearInterval(memoryTimerInterval);
                    playTone(440, 0.2, 'sine');
                    startColorAdjust();
                }
            }, 1000);
        }

        function startColorAdjust() {
            currentState = GAME_STATES.RUNNING;
            
            // Se elimina la etiqueta 'oculto' y se deja únicamente la caja del mismo tamaño que al principio con el color que estás cambiando
            mainDisplayArea.innerHTML = `
                <div class="color-game-area">
                    <div class="color-adjust-row">
                        <div class="color-preview-box" id="userColorBox" style="background-color: hsl(0, 50%, 50%);">
                            <span class="color-box-label">TU COPIA</span>
                        </div>
                    </div>
                    
                    <div class="sliders-col">
                        <div class="slider-group">
                            <div class="slider-label"><span>Tono (Hue)</span><span id="valH">0°</span></div>
                            <input type="range" id="hueSlider" class="color-slider" min="0" max="360" value="0">
                        </div>
                        <div class="slider-group">
                            <div class="slider-label"><span>Saturación</span><span id="valS">50%</span></div>
                            <input type="range" id="satSlider" class="color-slider" min="0" max="100" value="50">
                        </div>
                        <div class="slider-group">
                            <div class="slider-label"><span>Intensidad (Luminosidad)</span><span id="valL">50%</span></div>
                            <input type="range" id="lightSlider" class="color-slider" min="0" max="100" value="50">
                        </div>
                    </div>
                </div>
            `;
            
            instructions.textContent = "Ajusta las barras para replicar el tono, saturación e intensidad que memorizaste.";

            const hS = document.getElementById('hueSlider');
            const sS = document.getElementById('satSlider');
            const lS = document.getElementById('lightSlider');
            const userBox = document.getElementById('userColorBox');

            function updateColor() {
                const h = hS.value;
                const s = sS.value;
                const l = lS.value;
                
                document.getElementById('valH').textContent = h + '°';
                document.getElementById('valS').textContent = s + '%';
                document.getElementById('valL').textContent = l + '%';
                
                userBox.style.backgroundColor = `hsl(${h}, ${s}%, ${l}%)`;
            }

            hS.addEventListener('input', updateColor);
            sS.addEventListener('input', updateColor);
            lS.addEventListener('input', updateColor);
        }

        function stopColorGameRound() {
            // Impedir que se valide si sigue en la pantalla de memoria
            if (memoryTimerCount > 0) return;

            const hS = document.getElementById('hueSlider').value;
            const sS = document.getElementById('satSlider').value;
            const lS = document.getElementById('lightSlider').value;
            
            let diffH = Math.abs(hS - targetH);
            if (diffH > 180) diffH = 360 - diffH;
            const diffS = Math.abs(sS - targetS);
            const diffL = Math.abs(lS - targetL);
            
            let roundPts = Math.max(0, 10 - ((diffH / 36) + (diffS / 15) + (diffL / 15)));

            totalScore += roundPts;
            roundScores.push(roundPts);
            
            currentState = GAME_STATES.STOPPED;

            const targetColorStr = `hsl(${targetH}, ${targetS}%, ${targetL}%)`;
            const userColorStr = `hsl(${hS}, ${sS}%, ${lS}%)`;
            
            mainDisplayArea.innerHTML = `
                <div class="timer-val" style="font-size: 3rem; margin-top:0.5rem;">Ronda ${round} Finalizada</div>
                <div class="results-compare-box">
                    <div class="results-preview-item">
                        <div class="results-preview-circle" style="background: ${targetColorStr};"></div>
                        <span style="font-size:0.75rem; font-weight:700; color:var(--text-muted)">OBJETIVO</span>
                    </div>
                    <div class="results-preview-item">
                        <div class="results-preview-circle" style="background: ${userColorStr};"></div>
                        <span style="font-size:0.75rem; font-weight:700; color:var(--text-muted)">TU COPIA</span>
                    </div>
                </div>
                <div class="score-label" style="font-size: 1rem; color: var(--text-muted); text-transform:uppercase; margin-top:10px;">Puntos de memoria</div>
                <div class="score-val animate-pop" id="scoreValDisplay" style="font-size: 4.5rem; color: var(--success-color);">0.00 / 10.00</div>
            `;

            // Animación ascendente de puntos en la ronda de color también
            const scoreValDisplay = document.getElementById('scoreValDisplay');
            let currentSVal = 0;
            const ptsInterval = setInterval(() => {
                currentSVal += roundPts / 30;
                if(currentSVal >= roundPts) {
                    currentSVal = roundPts;
                    clearInterval(ptsInterval);
                }
                scoreValDisplay.textContent = `${currentSVal.toFixed(2)} / 10.00`;
            }, 20);
            
            if (round < 5) {
                instructions.textContent = "Siguiente ronda de memoria preparada. Pulsa siguiente.";
            } else {
                instructions.textContent = "Partida completada. Pulsa el botón para ver el resumen final.";
            }
        }

        function nextRound() {
            if (currentState === GAME_STATES.SUMMARY) {
                round = 1;
                totalScore = 0;
                roundScores = [];
            } else if (currentState !== GAME_STATES.STOPPED && currentState !== GAME_STATES.IDLE) {
                return;
            }
            
            if (isColorMode) {
                resetGameDisplay();
                startColorMemorize();
            } else {
                const refs = resetGameDisplay();
                window.currTimerVal = refs.recreatedTimerVal;
                window.currScoreLabel = refs.recreatedScoreLabel;
                window.currScoreVal = refs.recreatedScoreVal;

                generateTarget();
                roundVal.textContent = round;
                roundVal.closest('.round-display').style.display = "block";
                targetVal.closest('.target-display').style.display = "block";
                currentState = GAME_STATES.IDLE;
                instructions.textContent = isHardMode 
                    ? "Modo Difícil activado. ¡Suelta para iniciar y reza por tu ritmo interno!" 
                    : "Mantén espacio para cargar. Suelta para iniciar el cronómetro.";
                gameCard.classList.add('animate-pop');
            }
        }

        function advanceRoundOrSummary() {
            if (currentState === GAME_STATES.SUMMARY) {
                nextRound();
            } else if (currentState === GAME_STATES.STOPPED) {
                if (round < 5) {
                    round++;
                    nextRound();
                } else {
                    showSummaryScreen();
                }
            } else if (currentState === GAME_STATES.RUNNING) {
                if (isColorMode) {
                    stopColorGameRound();
                } else {
                    stopTimer();
                }
            } else if (currentState === GAME_STATES.IDLE) {
                if (isColorMode) {
                    startColorMemorize();
                } else {
                    nextRound();
                }
            }
        }

        nextBtn.addEventListener('click', advanceRoundOrSummary);

        function triggerRestart() {
            round = 1;
            totalScore = 0;
            roundScores = [];
            
            if (memoryTimerInterval) clearInterval(memoryTimerInterval);
            
            nextRound();
        }

        restartNavBtn.addEventListener('click', triggerRestart);
        restartSummaryBtn.addEventListener('click', triggerRestart);

        generateTarget();
        window.currTimerVal = timerVal;
        window.currScoreLabel = scoreLabel;
        window.currScoreVal = scoreVal;

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();

                if (currentState === GAME_STATES.SUMMARY) return;

                if (isColorMode) {
                    if (currentState === GAME_STATES.IDLE) {
                        startColorMemorize();
                    } else if (currentState === GAME_STATES.RUNNING) {
                        stopColorGameRound();
                    } else if (currentState === GAME_STATES.STOPPED) {
                        advanceRoundOrSummary();
                    }
                } else {
                    if (currentState === GAME_STATES.IDLE) {
                        currentState = GAME_STATES.PREPARING;
                        body.className = (isHardMode ? 'mode-hard ' : '') + 'state-preparing';
                        instructions.textContent = "Cargando... Suelta para empezar.";
                        
                        chargePitch = 150;
                        chargeInterval = setInterval(() => {
                            if(chargePitch < 300) chargePitch += 10;
                            playTone(chargePitch, 0.1, 'sine', false);
                        }, 100);
                    }
                    else if (currentState === GAME_STATES.RUNNING) {
                        stopTimer();
                    }
                    else if (currentState === GAME_STATES.STOPPED) {
                        advanceRoundOrSummary();
                    }
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && !isColorMode) {
                if (currentState === GAME_STATES.PREPARING) {
                    clearInterval(chargeInterval);
                    startTimer();
                }
            }
        });

        function startTimer() {
            currentState = GAME_STATES.RUNNING;
            body.className = (isHardMode ? 'mode-hard ' : '') + 'state-running';
            instructions.textContent = "Pulsa espacio otra vez para parar.";
            
            playTone(600, 0.15, 'triangle');

            if (isHardMode) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                runningToneOsc = audioCtx.createOscillator();
                runningToneGain = audioCtx.createGain();
                runningToneOsc.type = 'sawtooth';
                runningToneOsc.frequency.value = 330.0;
                runningToneGain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                runningToneOsc.connect(runningToneGain);
                runningToneGain.connect(audioCtx.destination);
                runningToneOsc.start();
            }

            timerStart = performance.now();
            timerInterval = setInterval(() => {
                let now = performance.now();
                elapsedTime = (now - timerStart) / 1000;
                
                if (!isHardMode) {
                    window.currTimerVal.textContent = elapsedTime.toFixed(2);
                } else {
                    window.currTimerVal.textContent = "-";
                }

                if (!isHardMode && Math.floor(elapsedTime) > Math.floor(elapsedTime - 0.01)) {
                    playTone(400, 0.05, 'sine');
                    window.currTimerVal.classList.add('timer-tick-anim');
                    setTimeout(() => window.currTimerVal.classList.remove('timer-tick-anim'), 150);
                }
            }, 10);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            
            if (isHardMode && runningToneOsc) {
                try {
                    runningToneOsc.stop();
                    runningToneOsc.disconnect();
                } catch(e){}
                runningToneOsc = null;
            }

            currentState = GAME_STATES.STOPPED;
            body.className = isHardMode ? 'mode-hard' : '';

            let finalScore = getCalculatedScore(elapsedTime, targetTime);

            totalScore += finalScore;
            roundScores.push(finalScore);

            window.currTimerVal.textContent = elapsedTime.toFixed(2);
            window.currScoreLabel.textContent = `Nota Ronda ${round}`;
            
            instructions.classList.add('fade-in');

            if (finalScore < 5.00) {
                window.currScoreVal.style.color = 'var(--fail-color)';
                playTone(220, 0.3, 'sawtooth');
                gameCard.classList.add('animate-shake');
                setTimeout(() => gameCard.classList.remove('animate-shake'), 400);
            } else if (finalScore < 8.00) {
                window.currScoreVal.style.color = 'var(--ok-color)';
                playTone(660, 0.3, 'sine'); 
            } else {
                window.currScoreVal.style.color = 'var(--success-color)';
                playSuccessSparkle();
            }

            // Animación ascendente de puntos en modo tiempo aplicado correctamente
            let currentScoreSequence = 0;
            const scoreAnimationInterval = setInterval(() => {
                currentScoreSequence += finalScore / 40;
                if(currentScoreSequence >= finalScore) {
                    currentScoreSequence = finalScore;
                    clearInterval(scoreAnimationInterval);
                }
                window.currScoreVal.textContent = currentScoreSequence.toFixed(2) + " / 10.00";
            }, 20);
            window.currScoreVal.classList.add('animate-pop');

            if (round < 5) {
                instructions.textContent = "¡Ronda parada! Pulsa espacio o el botón para la siguiente ronda.";
            } else {
                instructions.textContent = "¡Partida completada! Pulsa espacio o el botón para ver el resumen final.";
            }
        }

        function showSummaryScreen() {
            currentState = GAME_STATES.SUMMARY;
            
            const TopBarContainer = document.getElementById('TopBarContainer');
            if (TopBarContainer) TopBarContainer.style.display = "none";
            if (cardBottomNav) cardBottomNav.style.display = "none"; 

            restartSummaryContainer.style.display = "flex";

            let roundsHtml = roundScores.map((score, idx) => {
                let gradeClass = getGradeClass(score > 10 ? (score/5) : (score*5/10));
                if(isColorMode) {
                     gradeClass = getGradeClass(score);
                }
                return `
                    <div class="round-box ${gradeClass}">
                        <span>${score.toFixed(1)}</span>
                    </div>
                `;
            }).join('');

            const maxTotalPts = isColorMode ? "50.00" : "50.00";

            // Animación ascendente incorporada en la puntuación final
            mainDisplayArea.innerHTML = `
                <div class="summary-title" id="sumTitleVal">0.00<span style="font-size: 2.5rem; font-weight: 900; color: var(--text-muted);">/${maxTotalPts}</span></div>
                <div class="summary-subtitle">${getSummaryFlavorText(totalScore)}</div>
                <div class="summary-box">
                    <div class="summary-header">
                        <span>Partida</span>
                        <span>${totalScore.toFixed(2)}/${maxTotalPts}</span>
                    </div>
                    <div class="rounds-grid">
                        ${roundsHtml}
                    </div>
                </div>
            `;

            // Efecto contador / subida de puntos
            const sumTitleVal = document.getElementById('sumTitleVal');
            let currentSum = 0.00;
            const sumInterval = setInterval(() => {
                currentSum += totalScore / 40;
                if (currentSum >= totalScore) {
                    currentSum = totalScore;
                    clearInterval(sumInterval);
                }
                sumTitleVal.innerHTML = `${currentSum.toFixed(2)}<span style="font-size: 2.5rem; font-weight: 900; color: var(--text-muted);">/${maxTotalPts}</span>`;
            }, 20);

            instructions.textContent = "Resumen final. Pulsa el botón de retroceso de abajo a la derecha para reiniciar.";

            playTone(1000, 0.2, 'sine');
            setTimeout(() => playTone(1200, 0.3, 'sine'), 200);
        }
    </script>
</body>
</html>
