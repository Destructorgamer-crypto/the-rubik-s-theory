<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialed Time</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');

        :root {
            --bg-color: #201321; 
            --card-bg: #321f33;
            --text-main: #ffffff;
            --text-muted: #e0cbe1;
            --prep-color: #fca5a5;
            --run-color: #93c5fd;
            --success-color: #86efac;
            --fail-color: #fca5a5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.4s ease;
        }

        .game-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 700px;
            height: 620px;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem 3.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.4s ease;
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .streak-display, .round-display {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .target-display {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .main-display {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            gap: 0.5rem;
        }

        .timer-val {
            font-size: 9.5rem;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
            letter-spacing: -4px;
            color: var(--text-main);
            transition: color 0.2s ease;
        }

        /* Cambios de estado temporizador */
        body.state-preparing .timer-val {
            color: var(--prep-color);
            animation: shakePrep 0.3s ease-in-out infinite alternate;
        }

        body.state-running .timer-val {
            color: var(--run-color);
        }

        .score-label {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-muted);
            text-align: center;
            min-height: 25px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .score-val {
            font-size: 4.5rem;
            font-weight: 700;
            text-align: center;
            min-height: 85px;
            color: var(--text-main);
            transition: color 0.3s ease;
        }

        .card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .instructions {
            font-size: 1.05rem;
            color: var(--text-muted);
            max-width: 420px;
            line-height: 1.5;
            font-weight: 400;
        }

        .btn-next {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
            border: none;
            outline: none;
        }

        .btn-next:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.1) rotate(90deg);
        }

        .btn-next svg {
            fill: var(--text-main);
            width: 28px;
            height: 28px;
        }

        /* Animaciones */
        .animate-pulse-subtle {
            animation: pulseSubtle 0.6s infinite alternate;
        }

        @keyframes pulseSubtle {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }

        .animate-pop {
            animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.85); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes shakePrep {
            0% { transform: translateY(0); }
            100% { transform: translateY(-3px); }
        }

        .animate-, .animate-shake {
            animation: shakeTotal 0.4s ease-in-out;
        }

        @keyframes shakeTotal {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(3px); }
        }

        .fade-in {
            animation: fadeInMsg 0.5s ease-in;
        }

        @keyframes fadeInMsg {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="game-card" id="gameCard">
        <div class="card-top">
            <div class="streak-display">Racha: <span id="streakVal">0</span></div>
            <div class="round-display">Ronda: <span id="roundVal">1</span>/5</div>
            <div class="target-display">Objetivo: <span id="targetVal">0.00</span>s</div>
        </div>

        <div class="main-display">
            <div class="timer-val" id="timerVal">0.00</div>
            <div class="score-label" id="scoreLabel"></div>
            <div class="score-val" id="scoreVal"></div>
        </div>

        <div class="card-bottom">
            <div class="instructions" id="instructions">
                Mantén espacio para cargar. Suelta para iniciar el conteo, pulsa otra vez para parar.
            </div>
            <button class="btn-next" id="nextBtn" aria-label="Siguiente">
                <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(freq, duration, type = 'sine', ramp = true) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.value = freq;
            
            gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
            if(ramp) {
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            } else {
                gain.gain.setValueAtTime(0.18, audioCtx.currentTime + duration - 0.05);
                gain.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            }

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const GAME_STATES = {
            IDLE: 0,
            PREPARING: 1,
            RUNNING: 2,
            STOPPED: 3,
            SUMMARY: 4
        };

        let currentState = GAME_STATES.IDLE;
        let targetTime = 0.00;
        let timerStart = 0;
        let timerInterval = null;
        let elapsedTime = 0;
        let streak = 0;
        let round = 1;
        let totalScore = 0;
        let chargeInterval = null;
        let chargePitch = 150;

        const body = document.body;
        const gameCard = document.getElementById('gameCard');
        const targetVal = document.getElementById('targetVal');
        const streakVal = document.getElementById('streakVal');
        const roundVal = document.getElementById('roundVal');
        const timerVal = document.getElementById('timerVal');
        const scoreLabel = document.getElementById('scoreLabel');
        const scoreVal = document.getElementById('scoreVal');
        const instructions = document.getElementById('instructions');
        const nextBtn = document.getElementById('nextBtn');

        function generateTarget() {
            targetTime = Math.floor(Math.random() * 901 + 100) / 100;
            targetVal.textContent = targetTime.toFixed(2);
        }

        function resetGameDisplay() {
            timerVal.textContent = "0.00";
            scoreLabel.textContent = "";
            scoreVal.textContent = "";
            body.className = '';
            scoreVal.className = 'score-val';
            instructions.className = 'instructions';
            gameCard.className = 'game-card';
        }

        function nextRound() {
            if (currentState === GAME_STATES.SUMMARY) {
                round = 1;
                totalScore = 0;
                streak = 0;
                streakVal.textContent = streak;
            } else if (currentState !== GAME_STATES.STOPPED && currentState !== GAME_STATES.IDLE) {
                return;
            }
            
            resetGameDisplay();
            generateTarget();
            roundVal.textContent = round;
            currentState = GAME_STATES.IDLE;
            instructions.textContent = "Mantén espacio para cargar. Suelta para iniciar.";
            gameCard.classList.add('animate-pop');
        }

        nextBtn.addEventListener('click', nextRound);

        generateTarget();

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();

                if (currentState === GAME_STATES.IDLE) {
                    currentState = GAME_STATES.PREPARING;
                    body.className = 'state-preparing';
                    instructions.textContent = "Cargando... Suelta para empezar.";
                    
                    chargePitch = 150;
                    chargeInterval = setInterval(() => {
                        if(chargePitch < 300) chargePitch += 10;
                        playTone(chargePitch, 0.1, 'sine', false);
                    }, 100);
                }
                else if (currentState === GAME_STATES.RUNNING) {
                    stopTimer();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                if (currentState === GAME_STATES.PREPARING) {
                    clearInterval(chargeInterval);
                    startTimer();
                }
            }
        });

        function startTimer() {
            currentState = GAME_STATES.RUNNING;
            body.className = 'state-running';
            instructions.textContent = "Pulsa espacio otra vez para parar.";
            
            playTone(600, 0.15, 'triangle');

            timerStart = performance.now();
            timerInterval = setInterval(() => {
                let now = performance.now();
                elapsedTime = (now - timerStart) / 1000;
                timerVal.textContent = elapsedTime.toFixed(2);

                if (Math.floor(elapsedTime) > Math.floor(elapsedTime - 0.01)) {
                    playTone(400, 0.05, 'sine');
                }
            }, 10);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            currentState = GAME_STATES.STOPPED;
            body.className = '';

            let diff = Math.abs(elapsedTime - targetTime);
            let rawScore = 10 - (diff * 10);
            let finalScore = Math.max(0, rawScore);

            totalScore += finalScore;

            timerVal.textContent = elapsedTime.toFixed(2);
            scoreLabel.textContent = `Nota Ronda ${round}`;
            scoreVal.textContent = finalScore.toFixed(2) + " / 10";
            scoreVal.classList.add('animate-pop');
            instructions.classList.add('fade-in');

            if (finalScore >= 8.00) {
                streak++;
                scoreVal.style.color = 'var(--success-color)';
                playTone(880, 0.3, 'sine');
                gameCard.classList.add('animate-pulse-subtle');
                setTimeout(() => gameCard.classList.remove('animate-pulse-subtle'), 600);
                instructions.textContent = "¡Increíble! Siguiente ronda...";
            } else {
                streak = 0;
                scoreVal.style.color = 'var(--fail-color)';
                playTone(220, 0.3, 'sawtooth');
                gameCard.classList.add('animate-shake');
                setTimeout(() => gameCard.classList.remove('animate-shake'), 400);
                instructions.textContent = "Por poco... Siguiente ronda...";
            }
            
            streakVal.textContent = streak;

            setTimeout(() => {
                if (round < 5) {
                    round++;
                    nextRound();
                } else {
                    // Fin de 5 rondas -> Resumen total sobre 50
                    currentState = GAME_STATES.SUMMARY;
                    resetGameDisplay();
                    
                    targetVal.textContent = "-";
                    roundVal.textContent = "5";
                    
                    scoreLabel.textContent = "NOTA TOTAL (5 RONDAS)";
                    scoreVal.textContent = totalScore.toFixed(2) + " / 50.00";
                    scoreVal.style.color = totalScore >= 40 ? 'var(--success-color)' : 'var(--text-main)';
                    scoreVal.classList.add('animate-pop');
                    
                    playTone(1000, 0.2, 'sine');
                    setTimeout(() => playTone(1200, 0.3, 'sine'), 200);

                    if (totalScore >= 40) {
                        gameCard.classList.add('animate-pulse-subtle');
                        instructions.textContent = "¡Has dominado el tiempo! Pulsa el botón de reinicio para volver a jugar.";
                    } else {
                        instructions.textContent = "¡Partida finalizada! Pulsa el botón de reinicio para intentarlo de nuevo.";
                    }
                }
            }, 3000);
        }
    </script>
</body>
</html>
