<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincronización Táctica</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;700&display=swap');

        :root {
            --bg-color: #0f0f11;
            --card-bg: #18181b;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent-prep: #27272a;
            --accent-active: #3b82f6;
            --accent-success: #10b981;
            --accent-danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Geist', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .game-container {
            background: var(--card-bg);
            padding: 3rem 4rem;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 90%;
            max-width: 550px;
        }

        /* Header con racha y objetivo */
        .stats-header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 1.1rem;
            color: var(--text-muted);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .streak-counter span, .record-counter span {
            color: var(--text-main);
            font-weight: 700;
        }

        /* Pantallas de objetivo y cronómetro */
        .target-section {
            text-align: center;
        }

        .target-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .target-time {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .timer-display {
            font-size: 5rem;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
            transition: color 0.2s ease;
        }

        /* Estados visuales de la barra espaciadora / preparación */
        body.is-preparing .timer-display {
            color: #fbbf24; /* Tono cálido tipo CSTimer al mantener sostenido */
        }

        body.is-running .timer-display {
            color: var(--accent-active);
        }

        /* Indicador de puntuación / resultado */
        .result-box {
            min-height: 40px;
            text-align: center;
        }

        .score-display {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .diff-display {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        /* Instrucciones */
        .instructions {
            font-size: 0.95rem;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.5;
            background: rgba(24, 24, 27, 0.8);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            border-left: 3px solid var(--text-muted);
        }

        /* Animaciones */
        @keyframes popIn {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-pop {
            animation: popIn 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="stats-header">
            <div class="streak-counter">Racha: <span id="streak">0</span></div>
            <div class="record-counter">Mejor Racha: <span id="bestStreak">0</span></div>
        </div>

        <div class="target-section">
            <div class="target-label">Tiempo Objetivo</div>
            <div class="target-time"><span id="targetTime">0.00</span>s</div>
        </div>

        <div class="timer-display" id="timer">0.00</div>

        <div class="result-box" id="resultBox">
            <div class="score-display" id="scoreDisplay"></div>
            <div class="diff-display" id="diffDisplay"></div>
        </div>

        <div class="instructions" id="instructions">
            Mantén la <strong>BARRA ESPACIADORA</strong> presionada para preparar. Suéltala para empezar a correr el tiempo. Presiónala de nuevo (o vuelve a soltar, según la fase) para detenerlo y clavar el objetivo.
        </div>
    </div>

    <script>
        const STATES = {
            IDLE: 'idle',         // Esperando a que mantengan espacio
            PREPARING: 'preparing', // Espacio mantenido, listo para soltar
            RUNNING: 'running',   // Tiempo corriendo
            STOPPED: 'stopped'    // Cronómetro detenido
        };

        let currentState = STATES.IDLE;
        let targetTime = 0.00;
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        
        let streak = 0;
        let bestStreak = 0;

        // Elementos DOM
        const body = document.body;
        const timerEl = document.getElementById('timer');
        const targetTimeEl = document.getElementById('targetTime');
        const streakEl = document.getElementById('streak');
        const bestStreakEl = document.getElementById('bestStreak');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const diffDisplay = document.getElementById('diffDisplay');
        const instructionsEl = document.getElementById('instructions');

        // Generar un objetivo aleatorio entre 1.00 y 10.00 segundos (con 2 decimales)
        function generateTarget() {
            targetTime = Math.floor(Math.random() * 901 + 100) / 100; // de 1.00 a 10.00
            targetTimeEl.textContent = targetTime.toFixed(2);
        }

        generateTarget();

        // Manejador de teclado
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // Evita que la página haga scroll al pulsar espacio

                if (currentState === STATES.IDLE) {
                    currentState = STATES.PREPARING;
                    body.classList.add('is-preparing');
                    instructionsEl.innerHTML = "Sueltala <strong>BARRA ESPACIADORA</strong> para iniciar el conteo...";
                } 
                else if (currentState === STATES.RUNNING) {
                    stopTimer();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                if (currentState === STATES.PREPARING) {
                    startTimer();
                } 
                // Si estaba corriendo, el requisito de parar puede ser volver a pulsar o soltar según prefieras, 
                // pero como pusimos que se detiene al volver a pulsar (keydown), dejamos el keyup libre o para otro propósito.
            }
        });

        function startTimer() {
            currentState = STATES.RUNNING;
            body.classList.remove('is-preparing');
            body.classList.add('is-running');
            
            // Reiniciar visuales anteriores
            scoreDisplay.textContent = '';
            diffDisplay.textContent = '';
            
            startTime = performance.now();
            
            timerInterval = setInterval(() => {
                let now = performance.now();
                elapsedTime = (now - startTime) / 1000;
                timerEl.textContent = elapsedTime.toFixed(2);
            }, 10); // Actualización fluida cada 10ms
            
            instructionsEl.innerHTML = "Pulsa otra vez para <strong>DETENER</strong> el tiempo...";
        }

        function stopTimer() {
            clearInterval(timerInterval);
            currentState = STATES.STOPPED;
            body.classList.remove('is-running');
            
            // Cálculo de puntuación sobre 10
            let difference = Math.abs(elapsedTime - targetTime);
            
            // Puntuación: si la diferencia es 0 -> 10. Si la diferencia es >= 1.00s -> 0.
            let rawScore = 10 - (difference * 10);
            let finalScore = Math.max(0, rawScore); 
            
            // Mostrar resultado visual
            scoreDisplay.textContent = `Nota: ${finalScore.toFixed(2)} / 10`;
            diffDisplay.textContent = `Diferencia: ${difference >= 0 ? '+' : ''}${(elapsedTime - targetTime).toFixed(2)}s`;
            
            // Sistema de racha estricto: consideremos éxito si sacas un 8.00 o más (tolerancia de 0.20s respecto al objetivo)
            if (finalScore >= 8.00) {
                streak++;
                streakEl.textContent = streak;
                if (streak > bestStreak) {
                    bestStreak = streak;
                    bestStreakEl.textContent = bestStreak;
                }
                scoreDisplay.style.color = 'var(--accent-success)';
            } else {
                streak = 0;
                streakEl.textContent = streak;
                scoreDisplay.style.color = 'var(--accent-danger)';
            }
            
            // Preparar siguiente ronda tras un breve instante
            setTimeout(() => {
                generateTarget();
                timerEl.textContent = "0.00";
                currentState = STATES.IDLE;
                instructionsEl.innerHTML = "Mantén la <strong>BARRA ESPACIADORA</strong> presionada para preparar la siguiente ronda.";
            }, 2500); // 2.5 segundos para leer tu nota y pasar al siguiente
        }
    </script>
</body>
</html>
