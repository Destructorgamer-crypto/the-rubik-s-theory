<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rubik's Theory</title>
    <style>
        :root { --c-white: #fff; --c-red: #ff3e3e; --c-blue: #3e7bff; --c-orange: #ff9f3e; --c-green: #3eff5e; --c-yellow: #ffe63e; }
        
        body { 
            background-color: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 20px; min-height: 100vh;
            /* Marco con colores del cubo */
            border: 8px solid transparent;
            border-image: linear-gradient(45deg, var(--c-white), var(--c-red), var(--c-blue), var(--c-orange), var(--c-green), var(--c-yellow));
            border-image-slice: 1;
            box-sizing: border-box;
        }

        .container { max-width: 900px; margin: auto; text-align: center; }
        
        header { padding: 50px 0; }
        h1 { font-size: 3.5em; letter-spacing: 10px; text-transform: uppercase; margin: 0; }
        
        nav { padding: 20px; display: flex; justify-content: center; gap: 30px; }
        nav button { background: none; border: none; color: #666; cursor: pointer; font-size: 1.1em; transition: 0.3s; }
        nav button:hover { color: #fff; }

        .section { display: none; padding: 40px; animation: fadeIn 0.8s; }
        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo para los embeds */
        iframe { width: 100%; height: 450px; border: 1px solid #333; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>THE RUBIK'S THEORY</h1>
        </header>

        <nav>
            <button onclick="show('home')">Inicio</button>
            <button onclick="show('principiante')">Principiante</button>
            <button onclick="show('intermedio')">Intermedio</button>
        </nav>

        <section id="home" class="section active">
            <h2>Domina la lógica</h2>
            <p>Selecciona un nivel en el menú superior para comenzar.</p>
        </section>

        <section id="principiante" class="section">
            <h2>Nivel Principiante</h2>
            <p>Aprende los movimientos básicos.</p>
            <iframe src="URL_DEL_VIDEO_O_JUEGO.embed"></iframe>
        </section>

        <section id="intermedio" class="section">
            <h2>Nivel Intermedio</h2>
            <p>Algoritmos más complejos.</p>
        </section>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
